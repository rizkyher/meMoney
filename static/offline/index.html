<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A4174" />
    <title>meMoney Offline</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #001d39;
        --navy: #0a4174;
        --sky: #7bbde8;
        --paper: #bdd8e9;
        --mist: #e8f4fb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, var(--paper), var(--mist));
      }
      main {
        width: min(100%, 420px);
        border: 1px solid rgb(10 65 116 / 16%);
        border-radius: 24px;
        background: rgb(255 255 255 / 74%);
        padding: 24px;
        box-shadow: 0 24px 70px rgb(0 29 57 / 18%);
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        color: white;
        background: var(--navy);
        font-size: 24px;
        font-weight: 900;
      }
      h1 {
        margin: 20px 0 8px;
        font-size: 28px;
        line-height: 1.05;
      }
      p {
        margin: 0;
        color: rgb(0 29 57 / 72%);
        line-height: 1.6;
      }
      a {
        margin-top: 20px;
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        padding: 0 18px;
        color: white;
        background: var(--navy);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">m</div>
      <h1>Lagi offline</h1>
      <p>meMoney belum bisa mengambil data terbaru. Cek koneksi internet, lalu buka lagi halaman ini.</p>
      <a href="/app/dashboard">Coba lagi</a>
    </main>
  </body>
</html>
